# Pinned dependency lock for reproducible production builds.
#
# Generated by resolving requirements.txt inside the prod runtime image
# (python:3.12-slim-bookworm), so these are exactly the versions prod installs.
# The Dockerfile installs from THIS file, not requirements.txt, so a routine
# rebuild of unchanged code can't silently pull a newer/breaking release.
#
# To refresh after changing requirements.txt (do this deliberately, then test):
#   docker run --rm -v "$PWD":/app -w /app python:3.12-slim-bookworm \
#     sh -c 'pip install -q --upgrade pip && pip install -q -r requirements.txt \
#            && pip freeze --exclude-editable' | sort > requirements.lock
# (then re-add this header)
#
# requirements.txt remains the human-editable list of top-level deps + floors.

