# Local development + simple-prod stack for ReadyRoute V2.
#
# Usage:
#   docker compose up --build         # backend + frontend, sqlite by default
#   docker compose --profile postgres up --build   # add a postgres service
#
# Customize via a .env file in this directory (see .env.example).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: readyroutev2-backend:latest
    container_name: readyroutev2-backend
    restart: unless-stopped
    environment:
      # Default to a sqlite db stored in the mounted .data volume.
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/.data/truckv2_dev.db}
      SECRET_KEY:   ${SECRET_KEY:-change-me-to-a-long-random-string}
      ALGORITHM:    ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SESSION_EXPIRY_DAYS:         ${SESSION_EXPIRY_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TIMEZONE:     ${TIMEZONE:-America/New_York}
    volumes:
      - backend_data:/app/.data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/docs"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: readyroutev2-frontend:latest
    container_name: readyroutev2-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  watchdog:
    image: alpine:3.20
    container_name: readyroutev2-watchdog
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      WATCHDOG_BACKEND_URL: ${WATCHDOG_BACKEND_URL:-http://backend:8000/health}
      WATCHDOG_FRONTEND_URL: ${WATCHDOG_FRONTEND_URL:-http://frontend}
      WATCHDOG_BACKEND_CONTAINER: ${WATCHDOG_BACKEND_CONTAINER:-readyroutev2-backend}
      WATCHDOG_FRONTEND_CONTAINER: ${WATCHDOG_FRONTEND_CONTAINER:-readyroutev2-frontend}
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-20}
      WATCHDOG_FAILURE_THRESHOLD: ${WATCHDOG_FAILURE_THRESHOLD:-3}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/sh
      - -c
      - |-
        apk add --no-cache curl docker-cli > /dev/null 2>&1
        bf=0; ff=0
        log() { printf '[%s] %s\n' "$(date '+%Y-%m-%d %H:%M:%S')" "$1"; }
        ok() { curl -fsSL --max-time 8 "$1" > /dev/null 2>&1; }
        log "Watchdog started."
        while true; do
          if ok "$WATCHDOG_BACKEND_URL";  then bf=0; else bf=$((bf+1)); log "Backend unhealthy ${bf}/${WATCHDOG_FAILURE_THRESHOLD}"; fi
          if ok "$WATCHDOG_FRONTEND_URL"; then ff=0; else ff=$((ff+1)); log "Frontend unhealthy ${ff}/${WATCHDOG_FAILURE_THRESHOLD}"; fi
          if [ "$bf" -ge "$WATCHDOG_FAILURE_THRESHOLD" ]; then
            log "Restarting $WATCHDOG_BACKEND_CONTAINER"
            docker restart "$WATCHDOG_BACKEND_CONTAINER" || true
            bf=0
          fi
          if [ "$ff" -ge "$WATCHDOG_FAILURE_THRESHOLD" ]; then
            log "Restarting $WATCHDOG_FRONTEND_CONTAINER"
            docker restart "$WATCHDOG_FRONTEND_CONTAINER" || true
            ff=0
          fi
          sleep "$WATCHDOG_INTERVAL_SECONDS"
        done

  # Optional: spin up a local postgres by enabling the 'postgres' profile.
  # Then set DATABASE_URL=postgresql+psycopg://readyroute:readyroute@db:5432/readyroute
  db:
    image: postgres:16-alpine
    container_name: readyroutev2-db
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-readyroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-readyroute}
      POSTGRES_DB:       ${POSTGRES_DB:-readyroute}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-readyroute} -d ${POSTGRES_DB:-readyroute}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend_data:
  pg_data:
