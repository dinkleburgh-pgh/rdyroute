# nginx config for the ReadyRoute V2 frontend container.
# Serves the Vite build output and proxies /api/* to the backend service.

upstream readyroute_backend {
    # 'backend' is the service name from docker-compose.yml
    server backend:8000;
    # Reuse TCP connections to the backend (avoids reconnect overhead per request)
    keepalive 32;
}

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Reasonable defaults
    sendfile        on;
    tcp_nopush      on;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    application/xml text/xml image/svg+xml font/woff2;
    client_max_body_size 25m;

    # API proxy — strip the /api prefix to match FastAPI routes.
    # NOTE: Do NOT set Upgrade/Connection headers here; those are WebSocket-only
    #       and break HTTP/1.1 keepalive to the upstream when set on REST traffic.
    location /api/ {
        proxy_pass         http://readyroute_backend/;
        proxy_http_version 1.1;
        # Empty Connection header enables keepalive to the upstream pool
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Never serve stale API responses from nginx's own cache
        proxy_no_cache     1;
        proxy_cache_bypass 1;
    }

    # WebSocket proxy — forward /ws directly to the backend.
    # Upgrade/Connection headers are required here to negotiate the WS handshake.
    location /ws {
        proxy_pass         http://readyroute_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Disable buffering — WebSocket frames must be forwarded immediately
        proxy_buffering    off;
        # Long timeout: WebSocket connections are long-lived (idle keepalive pings)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback: serve index.html for any unknown route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
