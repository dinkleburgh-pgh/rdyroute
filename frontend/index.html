<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <title>ReadyRoute V2</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReadyRoute" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-app text-ink-soft font-sans antialiased">
    <div id="root"></div>
    <script type="module">
      const DEV_SW_RESET_KEY = "readyroute:dev-sw-reset";
      const isViteDevServer = Boolean(document.querySelector('script[src="/@vite/client"]'));

      async function bootstrap() {
        if (isViteDevServer && "serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          if (registrations.length > 0) {
            await Promise.all(registrations.map((registration) => registration.unregister().catch(() => false)));
            if ("caches" in window) {
              const keys = await caches.keys().catch(() => []);
              await Promise.all(keys.map((key) => caches.delete(key).catch(() => false)));
            }
            if (!sessionStorage.getItem(DEV_SW_RESET_KEY)) {
              sessionStorage.setItem(DEV_SW_RESET_KEY, "1");
              window.location.reload();
              return;
            }
            sessionStorage.removeItem(DEV_SW_RESET_KEY);
          } else {
            sessionStorage.removeItem(DEV_SW_RESET_KEY);
          }
        }

        await import("/src/main.tsx");
      }

      void bootstrap();
    </script>
  </body>
</html>
