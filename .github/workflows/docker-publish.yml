name: Build & publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rdyroute-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rdyroute-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Compute build number ──────────────────────────────────────────
      # Version is simply build.<run_number> — the app is already named V2
      # so the major version is implicit and not repeated in build labels.
      - name: Compute APP_VERSION
        id: appver
        run: |
          APP_VERSION="build.${{ github.run_number }}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed APP_VERSION=${APP_VERSION}"

      # ── Backend ────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.appver.outputs.app_version }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.appver.outputs.app_version }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend ───────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ steps.appver.outputs.app_version }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.appver.outputs.app_version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Notify production (after images are in GHCR) ──────────────────
      # Pings the /updates/push webhook so Portainer pulls the images that
      # were just built — not the ones from the previous commit.
      # Requires: PROD_UPDATE_URL and PROD_UPDATE_SECRET repo secrets.
      # PROD_UPDATE_URL  = https://rdyroute.app/api/updates/push
      # PROD_UPDATE_SECRET = value of update_push_secret AppSetting
      - name: Notify production to redeploy
        env:
          PROD_UPDATE_URL: ${{ secrets.PROD_UPDATE_URL }}
          PROD_UPDATE_SECRET: ${{ secrets.PROD_UPDATE_SECRET }}
        run: |
          curl -fsS \
            -X POST "$PROD_UPDATE_URL" \
            -H "Content-Type: application/json" \
            -H "x-readyroute-secret: $PROD_UPDATE_SECRET" \
            -d '{
              "ref": "refs/heads/main",
              "head_commit": {
                "id": "${{ github.sha }}",
                "message": ${{ toJson(github.event.head_commit.message) }}
              }
            }' \
            --max-time 15 \
          && echo "[notify] Production redeploy triggered." \
          || echo "[notify] WARNING: could not reach production (non-fatal)."
