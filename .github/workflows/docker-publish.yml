name: Build & publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rdyroute-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rdyroute-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Compute build number ──────────────────────────────────────────
      # Version is simply build.<run_number> — the app is already named V2
      # so the major version is implicit and not repeated in build labels.
      - name: Compute APP_VERSION
        id: appver
        run: |
          APP_VERSION="build.${{ github.run_number }}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed APP_VERSION=${APP_VERSION}"

      # ── Backend ────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.appver.outputs.app_version }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.appver.outputs.app_version }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend ───────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            APP_VERSION=${{ steps.appver.outputs.app_version }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.appver.outputs.app_version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Notify production (after images are in GHCR) ──────────────────
      # Pings the /updates/push webhook so Portainer pulls the images that
      # were just built — not the ones from the previous commit.
      # Requires: PROD_UPDATE_URL and PROD_UPDATE_SECRET repo secrets.
      # PROD_UPDATE_URL  = https://rdyroute.app/api/updates/push
      # PROD_UPDATE_SECRET = value of update_push_secret AppSetting
      - name: Notify production to redeploy
        env:
          PROD_UPDATE_URL: ${{ secrets.PROD_UPDATE_URL }}
          PROD_UPDATE_SECRET: ${{ secrets.PROD_UPDATE_SECRET }}
          # Passed as env (not interpolated into the script) so arbitrary commit
          # message characters (quotes, apostrophes, parens) can't break the shell.
          HEAD_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$PROD_UPDATE_URL" ]; then
            echo "[notify] PROD_UPDATE_URL not configured — skipping."
            exit 0
          fi
          payload="$(jq -n --arg sha "$HEAD_SHA" --arg msg "$COMMIT_MESSAGE" \
            '{ref: "refs/heads/main", head_commit: {id: $sha, message: $msg}}')"
          if curl -fsS \
            -X POST "$PROD_UPDATE_URL" \
            -H "Content-Type: application/json" \
            -H "x-readyroute-secret: $PROD_UPDATE_SECRET" \
            -d "$payload" \
            --max-time 15; then
            echo "[notify] Production redeploy triggered."
          else
            echo "[notify] WARNING: could not reach production (non-fatal)."
          fi

      # ── Direct Portainer redeploy (bypasses app webhook) ──────────────
      # For compose-file (type-2) stacks: sends the current docker-compose.prod.yml
      # directly to Portainer so the stored copy is always up-to-date.
      # For git-backed (type-1) stacks: calls git/redeploy directly.
      # No-op if PORTAINER_URL secret is not configured.
      # Required secrets: PORTAINER_URL, PORTAINER_API_KEY,
      #   PORTAINER_ENDPOINT_ID, and either PORTAINER_STACK_NAME or PORTAINER_STACK_ID.
      - name: Direct Portainer redeploy
        env:
          PORTAINER_URL:         ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY:     ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_STACK_NAME:  ${{ secrets.PORTAINER_STACK_NAME }}
          PORTAINER_STACK_ID:    ${{ secrets.PORTAINER_STACK_ID }}
        run: |
          if [ -z "$PORTAINER_URL" ] || [ -z "$PORTAINER_API_KEY" ] || [ -z "$PORTAINER_ENDPOINT_ID" ]; then
            echo "[portainer] PORTAINER_URL/API_KEY/ENDPOINT_ID not configured — skipping direct redeploy."
            exit 0
          fi
          python3 - <<'PYEOF'
          import os, json, ssl, sys, urllib.request

          url     = os.environ["PORTAINER_URL"].rstrip("/")
          api_key = os.environ["PORTAINER_API_KEY"]
          ep      = os.environ["PORTAINER_ENDPOINT_ID"]
          name    = os.environ.get("PORTAINER_STACK_NAME", "").strip()
          sid     = os.environ.get("PORTAINER_STACK_ID", "").strip()

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          def _get(path):
              r = urllib.request.Request(f"{url}{path}", headers={"X-API-Key": api_key})
              with urllib.request.urlopen(r, context=ctx, timeout=15) as resp:
                  return json.loads(resp.read().decode(errors="replace"))

          def _put(path, body):
              payload = json.dumps(body).encode()
              r = urllib.request.Request(
                  f"{url}{path}", data=payload, method="PUT",
                  headers={"Content-Type": "application/json", "X-API-Key": api_key},
              )
              with urllib.request.urlopen(r, context=ctx, timeout=120) as resp:
                  return resp.status, resp.read().decode(errors="replace")

          # Resolve stack ID
          if not sid:
              all_stacks = _get("/api/stacks")
              match = next((s for s in all_stacks if s.get("Name") == name), None)
              if not match:
                  print(f"[portainer] Stack '{name}' not found. Available: {[s.get('Name') for s in all_stacks]}")
                  sys.exit(1)
              sid = str(match["Id"])
              print(f"[portainer] Resolved '{name}' → stack ID {sid}")

          stack_info = _get(f"/api/stacks/{sid}")
          current_env = stack_info.get("Env") or []
          stack_type  = stack_info.get("Type", 2)
          print(f"[portainer] Stack type={stack_type}, env vars={len(current_env)}")

          if stack_type == 1:
              # Git-backed: trigger git/redeploy (Portainer pulls latest from main)
              status, body = _put(
                  f"/api/stacks/{sid}/git/redeploy?endpointId={ep}",
                  {"prune": False, "pullImage": True,
                   "repositoryAuthentication": False,
                   "repositoryReferenceName": "refs/heads/main",
                   "env": current_env},
              )
          else:
              # Compose-file: send the local compose file so Portainer's stored copy is updated
              with open("docker-compose.prod.yml") as f:
                  compose_content = f.read()
              print("[portainer] Using local docker-compose.prod.yml for type-2 stack")
              status, body = _put(
                  f"/api/stacks/{sid}?endpointId={ep}",
                  {"env": current_env, "prune": False,
                   "pullImage": True, "stackFileContent": compose_content},
              )

          print(f"[portainer] Redeploy status={status}")
          print(body[:500])
          if status not in (200, 204):
              sys.exit(1)
          PYEOF
