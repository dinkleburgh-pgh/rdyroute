<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode — Share a Tab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f8fafc;
      letter-spacing: -0.01em;
    }

    header p {
      margin-top: 6px;
      font-size: 0.875rem;
      color: #64748b;
    }

    #status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 24px;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    #status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    #status.error .dot { background: #ef4444; animation: none; }
    #status.loading .dot { background: #f59e0b; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #tab-list {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tab-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-align: left;
      width: 100%;
      color: inherit;
    }

    .tab-card:hover {
      border-color: #6366f1;
      background: #1e2440;
    }

    .tab-card:active {
      transform: scale(0.99);
    }

    .tab-card.selected {
      border-color: #6366f1;
      background: #1e2440;
    }

    .tab-card.selected::after {
      content: "Shared";
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6366f1;
      background: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    .tab-favicon {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .tab-favicon-placeholder {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      background: #2d3748;
      flex-shrink: 0;
    }

    .tab-info {
      min-width: 0;
      flex: 1;
    }

    .tab-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-url {
      font-size: 0.75rem;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22c55e;
      color: #052e16;
      font-size: 0.825rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #ef4444;
      color: #fff;
    }

    #refresh-btn {
      margin-top: 20px;
      background: none;
      border: 1px solid #2d3748;
      color: #64748b;
      font-size: 0.8rem;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #refresh-btn:hover {
      border-color: #475569;
      color: #94a3b8;
    }

    .empty {
      color: #475569;
      font-size: 0.875rem;
      text-align: center;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Share a tab with OpenCode</h1>
    <p>Click any tab below to let OpenCode see and interact with it</p>
  </header>

  <div id="status" class="loading">
    <span class="dot"></span>
    <span id="status-text">Connecting to Chrome...</span>
  </div>

  <div id="tab-list"></div>
  <button id="refresh-btn" onclick="loadTabs()">Refresh</button>

  <div class="toast" id="toast"></div>

  <script>
    let selectedId = null;

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (isError ? " error" : "");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = "toast"; }, 2500);
    }

    function setStatus(text, state = "ok") {
      const el = document.getElementById("status");
      el.className = state === "error" ? "error" : state === "loading" ? "loading" : "";
      document.getElementById("status-text").textContent = text;
      // add the dot back (it gets wiped by className change)
      if (!el.querySelector(".dot")) {
        const dot = document.createElement("span");
        dot.className = "dot";
        el.prepend(dot);
      }
    }

    async function loadTabs() {
      setStatus("Loading tabs...", "loading");
      try {
        const res = await fetch("/tabs");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const tabs = await res.json();

        const list = document.getElementById("tab-list");
        list.innerHTML = "";

        if (tabs.length === 0) {
          list.innerHTML = '<p class="empty">No open Chrome tabs found.</p>';
          setStatus("Connected — no tabs open", "ok");
          return;
        }

        tabs.forEach((tab) => {
          const card = document.createElement("button");
          card.className = "tab-card" + (tab.id === selectedId ? " selected" : "");
          card.dataset.id = tab.id;

          const favicon = tab.faviconUrl
            ? `<img class="tab-favicon" src="${escHtml(tab.faviconUrl)}" onerror="this.replaceWith(makePlaceholder())" />`
            : `<span class="tab-favicon-placeholder"></span>`;

          card.innerHTML = `
            ${favicon}
            <div class="tab-info">
              <div class="tab-title">${escHtml(tab.title || "(no title)")}</div>
              <div class="tab-url">${escHtml(tab.url)}</div>
            </div>
          `;

          card.addEventListener("click", () => selectTab(tab.id, tab.title));
          list.appendChild(card);
        });

        setStatus(`${tabs.length} tab${tabs.length !== 1 ? "s" : ""} open`, "ok");
      } catch (err) {
        setStatus("Cannot reach Chrome — is it running?", "error");
        document.getElementById("tab-list").innerHTML =
          '<p class="empty">Could not load tabs. Make sure Chrome is open.</p>';
      }
    }

    async function selectTab(id, title) {
      try {
        const res = await fetch("/select", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }),
        });
        const data = await res.json();
        if (data.ok) {
          selectedId = id;
          showToast(`Now sharing: ${title}`);
          loadTabs(); // refresh to show "Shared" badge
        } else {
          showToast("Failed to share: " + data.error, true);
        }
      } catch (err) {
        showToast("Error: " + err.message, true);
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function makePlaceholder() {
      const s = document.createElement("span");
      s.className = "tab-favicon-placeholder";
      return s;
    }

    // Auto-refresh every 5 seconds
    loadTabs();
    setInterval(loadTabs, 5000);
  </script>
</body>
</html>
