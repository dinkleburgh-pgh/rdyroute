# Production image-pull stack for ReadyRoute V2.
#
# Workflow:
#   docker compose --env-file .env -f docker-compose.prod.yml pull
#   docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
#
# Data persists in named volumes even when images are repulled.
# DB_PASSWORD and DB_REPL_PASSWORD must be set in .env / Portainer env vars.

services:
  # ---------------------------------------------------------------------------
  # Primary PostgreSQL — streaming replication to USB standby.
  # Port 5432 is exposed on the host so the USB replica can connect via:
  #   router public IP (73.117.168.91):5432  →  192.168.1.132:5432
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: readyroutev2-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-readyroute}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-readyroute}
      REPLICATION_PASSWORD: ${DB_REPL_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=3
        -c max_replication_slots=3
        -c hot_standby=on
        -c listen_addresses=*
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-readyroute} -d ${DB_NAME:-readyroute}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # One-time primary setup: creates the replicator user + replication slot,
  # and adds a pg_hba.conf entry for remote replication.
  # Shares pg_data volume to append to pg_hba.conf directly, then reloads.
  # Idempotent — exits 0 immediately if already configured.
  # ---------------------------------------------------------------------------
  db-setup:
    image: postgres:16-alpine
    container_name: readyroutev2-db-setup
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD:          ${DB_PASSWORD}
      DB_USER:             ${DB_USER:-readyroute}
      DB_NAME:             ${DB_NAME:-readyroute}
      DB_REPL_PASSWORD:    ${DB_REPL_PASSWORD}
    volumes:
      - pg_data:/pgdata
    command:
      - /bin/sh
      - -c
      - |
          set -e
          # Idempotency check
          if psql -h db -U "$DB_USER" -d "$DB_NAME" -tAc \
               "SELECT 1 FROM pg_roles WHERE rolname='replicator'" | grep -q 1; then
            echo "[db-setup] replicator already configured — nothing to do"
            exit 0
          fi
          echo "[db-setup] creating replication user and slot..."
          psql -h db -U "$DB_USER" -d "$DB_NAME" \
            -c "CREATE USER replicator WITH REPLICATION LOGIN PASSWORD '$DB_REPL_PASSWORD'"
          psql -h db -U "$DB_USER" -d "$DB_NAME" \
            -c "SELECT pg_create_physical_replication_slot('usb_standby')"
          # Append replication access to pg_hba.conf (shared volume)
          if ! grep -q 'replicator' /pgdata/pg_hba.conf 2>/dev/null; then
            echo 'host replication replicator 0.0.0.0/0 scram-sha-256' >> /pgdata/pg_hba.conf
          fi
          psql -h db -U "$DB_USER" -d "$DB_NAME" -c "SELECT pg_reload_conf()"
          echo "[db-setup] done"

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/dinkleburgh-pgh/rdyroute-backend}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: readyroutev2-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${DB_USER:-readyroute}:${DB_PASSWORD}@db:5432/${DB_NAME:-readyroute}}
      POSTGRES_CONTAINER: ${POSTGRES_CONTAINER:-readyroutev2-db}
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:-}
      AUDIT_PHOTOS_DIR: ${AUDIT_PHOTOS_DIR:-/app/.data/audit_photos}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-random-string}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SESSION_EXPIRY_DAYS: ${SESSION_EXPIRY_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TIMEZONE: ${TIMEZONE:-America/New_York}
    volumes:
      - backend_data:/app/.data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/dinkleburgh-pgh/rdyroute-frontend}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: readyroutev2-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-}
      BACKEND_HEALTH_URL: ${BACKEND_HEALTH_URL:-http://backend:8000/health}
      # HOST_PORT lets the startup script display the correct external port.
      # HOST_IP can be set in .env to override auto-detection (e.g. HOST_IP=192.168.1.132).
      HOST_PORT: ${FRONTEND_PORT:-5180}
      HOST_IP: ${HOST_IP:-}
    ports:
      - "${FRONTEND_PORT:-5180}:80"

  watchdog:
    image: alpine:3.20
    container_name: readyroutev2-watchdog
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      WATCHDOG_BACKEND_URL: ${WATCHDOG_BACKEND_URL:-http://backend:8000/health}
      WATCHDOG_FRONTEND_URL: ${WATCHDOG_FRONTEND_URL:-http://frontend}
      WATCHDOG_BACKEND_CONTAINER: ${WATCHDOG_BACKEND_CONTAINER:-readyroutev2-backend}
      WATCHDOG_FRONTEND_CONTAINER: ${WATCHDOG_FRONTEND_CONTAINER:-readyroutev2-frontend}
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-20}
      WATCHDOG_FAILURE_THRESHOLD: ${WATCHDOG_FAILURE_THRESHOLD:-3}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/sh
      - -c
      - |-
          apk add --no-cache curl > /dev/null 2>&1
          log() { printf '[%s] %s\n' "$$(date '+%Y-%m-%d %H:%M:%S')" "$$1"; }
          ok()  { curl -sf -m 8 "$$1" > /dev/null 2>&1; }
          restart_c() {
            curl -sf -m 10 --unix-socket /var/run/docker.sock \
              -X POST "http://localhost/containers/$$1/restart" > /dev/null 2>&1 \
              && log "Restarted $$1" || log "Restart failed: $$1"
          }
          log "Watchdog started. Backend=$$WATCHDOG_BACKEND_URL Frontend=$$WATCHDOG_FRONTEND_URL"
          bf=0; ff=0
          while true; do
            ok "$$WATCHDOG_BACKEND_URL"  && bf=0 || { bf=$$((bf+1)); log "Backend fail $${bf}/$${WATCHDOG_FAILURE_THRESHOLD}"; }
            ok "$$WATCHDOG_FRONTEND_URL" && ff=0 || { ff=$$((ff+1)); log "Frontend fail $${ff}/$${WATCHDOG_FAILURE_THRESHOLD}"; }
            [ "$$bf" -ge "$$WATCHDOG_FAILURE_THRESHOLD" ] && { restart_c "$$WATCHDOG_BACKEND_CONTAINER";  bf=0; }
            [ "$$ff" -ge "$$WATCHDOG_FAILURE_THRESHOLD" ] && { restart_c "$$WATCHDOG_FRONTEND_CONTAINER"; ff=0; }
            sleep "$$WATCHDOG_INTERVAL_SECONDS"
          done

volumes:
  backend_data:
  pg_data:

networks:
  default:
    driver: bridge
    enable_ipv6: false