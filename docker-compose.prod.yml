# Production image-pull stack for ReadyRoute V2.
#
# Workflow:
#   docker compose --env-file .env -f docker-compose.prod.yml pull
#   docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
#
# Data persists in the named backend_data volume even when images are repulled.

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/dinkleburgh-pgh/rdyroute-backend}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: readyroutev2-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/.data/truckv2_prod.db}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-random-string}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SESSION_EXPIRY_DAYS: ${SESSION_EXPIRY_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TIMEZONE: ${TIMEZONE:-America/New_York}
    volumes:
      - backend_data:/app/.data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/dinkleburgh-pgh/rdyroute-frontend}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: readyroutev2-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-}
      BACKEND_HEALTH_URL: ${BACKEND_HEALTH_URL:-http://backend:8000/health}
    ports:
      - "${FRONTEND_PORT:-80}:80"

  watchdog:
    image: alpine:3.20
    container_name: readyroutev2-watchdog
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      WATCHDOG_BACKEND_URL: ${WATCHDOG_BACKEND_URL:-http://backend:8000/health}
      WATCHDOG_FRONTEND_URL: ${WATCHDOG_FRONTEND_URL:-http://frontend}
      WATCHDOG_BACKEND_CONTAINER: ${WATCHDOG_BACKEND_CONTAINER:-readyroutev2-backend}
      WATCHDOG_FRONTEND_CONTAINER: ${WATCHDOG_FRONTEND_CONTAINER:-readyroutev2-frontend}
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-20}
      WATCHDOG_FAILURE_THRESHOLD: ${WATCHDOG_FAILURE_THRESHOLD:-3}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/sh
      - -c
      - |-
          apk add --no-cache curl > /dev/null 2>&1
          log() { printf '[%s] %s\n' "$$(date '+%Y-%m-%d %H:%M:%S')" "$$1"; }
          ok()  { curl -sf -m 8 "$$1" > /dev/null 2>&1; }
          restart_c() {
            curl -sf -m 10 --unix-socket /var/run/docker.sock \
              -X POST "http://localhost/containers/$$1/restart" > /dev/null 2>&1 \
              && log "Restarted $$1" || log "Restart failed: $$1"
          }
          log "Watchdog started. Backend=$$WATCHDOG_BACKEND_URL Frontend=$$WATCHDOG_FRONTEND_URL"
          bf=0; ff=0
          while true; do
            ok "$$WATCHDOG_BACKEND_URL"  && bf=0 || { bf=$$((bf+1)); log "Backend fail $${bf}/$${WATCHDOG_FAILURE_THRESHOLD}"; }
            ok "$$WATCHDOG_FRONTEND_URL" && ff=0 || { ff=$$((ff+1)); log "Frontend fail $${ff}/$${WATCHDOG_FAILURE_THRESHOLD}"; }
            [ "$$bf" -ge "$$WATCHDOG_FAILURE_THRESHOLD" ] && { restart_c "$$WATCHDOG_BACKEND_CONTAINER";  bf=0; }
            [ "$$ff" -ge "$$WATCHDOG_FAILURE_THRESHOLD" ] && { restart_c "$$WATCHDOG_FRONTEND_CONTAINER"; ff=0; }
            sleep "$$WATCHDOG_INTERVAL_SECONDS"
          done

volumes:
  backend_data: